services:
  db:
    image: postgres:17-alpine
    container_name: ecuvel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ecuvel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
    container_name: ecuvel-web
    restart: unless-stopped
    env_file:
      - .env
    command:
      - flask
      - --app
      - wsgi:app
      - run
      - --host=0.0.0.0
      - --port=8000
      - --debug
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ecuvel_postgres_data: