services:
  db:
    image: postgres:17-alpine
    container_name: ecuvel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ecuvel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
    container_name: ecuvel-web
    restart: unless-stopped
    env_file:
      - .env
    command:
      - flask
      - --app
      - wsgi:app
      - run
      - --host=0.0.0.0
      - --port=8000
      - --debug
    volumes:
      - ./backend:/app
      - payment_proofs_data:/app/private/payment-proofs
      - product_reviews_data:/app/private/product-reviews
      - partner_documents_data:/app/private/partner-documents
      - partner_contracts_data:/app/private/partner-contracts
      - partner_product_drafts_data:/app/private/partner-product-drafts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  payment_expirer:
    build:
      context: ./backend
    container_name: ecuvel-payment-expirer
    restart: unless-stopped
    env_file:
      - .env
    command:
      - sh
      - -c
      - while true; do flask --app wsgi:app expire-pending-bank-transfer-payments --limit 100; sleep 60; done
    volumes:
      - ./backend:/app
      - payment_proofs_data:/app/private/payment-proofs
      - product_reviews_data:/app/private/product-reviews
      - partner_documents_data:/app/private/partner-documents
      - partner_contracts_data:/app/private/partner-contracts
      - partner_product_drafts_data:/app/private/partner-product-drafts
    depends_on:
      db:
        condition: service_healthy

volumes:
  ecuvel_postgres_data:
  payment_proofs_data:
  product_reviews_data:
  partner_documents_data:
  partner_contracts_data:
  partner_product_drafts_data:
