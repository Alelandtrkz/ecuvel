services:
  db_test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ecuvel_test
      POSTGRES_USER: ecuvel_test
      POSTGRES_PASSWORD: ecuvel_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecuvel_test -d ecuvel_test"]
      interval: 2s
      timeout: 5s
      retries: 20

  test:
    build:
      context: ./backend
      args:
        INSTALL_TEST_REQUIREMENTS: "true"
    environment:
      SECRET_KEY: test-only-secret
      DATABASE_URL: postgresql+psycopg://ecuvel_test:ecuvel_test@db_test:5432/ecuvel_test
      TESTING: "1"
      PAYMENT_PROOF_UPLOAD_DIR: /tmp/payment-proofs
      PAYMENT_PROOF_MAX_BYTES: "10485760"
      PRODUCT_REVIEW_UPLOAD_DIR: /tmp/product-reviews
      PARTNER_DOCUMENT_UPLOAD_DIR: /tmp/partner-documents
      PARTNER_CONTRACT_UPLOAD_DIR: /tmp/partner-contracts
      PARTNER_PRODUCT_DRAFT_UPLOAD_DIR: /tmp/partner-product-drafts
    command: ["pytest", "-q"]
    volumes:
      - ./backend:/app
    tmpfs:
      - /tmp/payment-proofs
      - /tmp/product-reviews
      - /tmp/partner-documents
      - /tmp/partner-contracts
      - /tmp/partner-product-drafts
    depends_on:
      db_test:
        condition: service_healthy

  payment_expirer:
    build:
      context: ./backend
      args:
        INSTALL_TEST_REQUIREMENTS: "true"
    profiles: ["payment-expirer"]
    environment:
      SECRET_KEY: test-only-secret
      DATABASE_URL: postgresql+psycopg://ecuvel_test:ecuvel_test@db_test:5432/ecuvel_test
      TESTING: "1"
      PAYMENT_PROOF_UPLOAD_DIR: /tmp/payment-proofs
      PRODUCT_REVIEW_UPLOAD_DIR: /tmp/product-reviews
      PARTNER_DOCUMENT_UPLOAD_DIR: /tmp/partner-documents
      PARTNER_CONTRACT_UPLOAD_DIR: /tmp/partner-contracts
      PARTNER_PRODUCT_DRAFT_UPLOAD_DIR: /tmp/partner-product-drafts
    command:
      - sh
      - -c
      - while true; do flask --app wsgi:app expire-pending-bank-transfer-payments --limit 100; sleep 60; done
    volumes:
      - ./backend:/app
    tmpfs:
      - /tmp/payment-proofs
      - /tmp/product-reviews
      - /tmp/partner-documents
      - /tmp/partner-contracts
      - /tmp/partner-product-drafts
    depends_on:
      db_test:
        condition: service_healthy
