services:
  db_test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ecuvel_test
      POSTGRES_USER: ecuvel_test
      POSTGRES_PASSWORD: ecuvel_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecuvel_test -d ecuvel_test"]
      interval: 2s
      timeout: 5s
      retries: 20

  test:
    build:
      context: ./backend
    environment:
      SECRET_KEY: test-only-secret
      DATABASE_URL: postgresql+psycopg://ecuvel_test:ecuvel_test@db_test:5432/ecuvel_test
      TESTING: "1"
    command: ["pytest", "-q"]
    volumes:
      - ./backend:/app
    depends_on:
      db_test:
        condition: service_healthy
