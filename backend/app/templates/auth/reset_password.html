{% extends "auth/auth_base.html" %}

{% block title %}Restablecer contraseña | Ecuvel{% endblock %}
{% block auth_content %}
<h1 id="auth-title">Restablecer contraseña</h1>
<p class="auth-card__intro">Elige una contraseña nueva para tu cuenta.</p>
<form method="post" action="{{ url_for('auth.reset_password_post', token=token) }}" class="auth-form" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="reset-password">Nueva contraseña</label>
  <input id="reset-password" name="password" type="password" autocomplete="new-password" maxlength="128" required>
  <label for="reset-password-confirmation">Confirmar contraseña</label>
  <input id="reset-password-confirmation" name="password_confirmation" type="password" autocomplete="new-password" maxlength="128" required>
  <button class="button button--primary auth-submit" type="submit">Actualizar contraseña</button>
</form>
{% endblock %}
