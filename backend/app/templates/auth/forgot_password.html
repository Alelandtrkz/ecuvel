{% extends "auth/auth_base.html" %}

{% block title %}Recuperar contraseña | Ecuvel{% endblock %}
{% block auth_content %}
<h1 id="auth-title">Recuperar contraseña</h1>
<p class="auth-card__intro">Te enviaremos instrucciones si existe una cuenta asociada al correo.</p>
<form method="post" action="{{ url_for('auth.forgot_password') }}" class="auth-form" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="forgot-email">Correo electrónico</label>
  <input id="forgot-email" name="email" type="email" autocomplete="email" maxlength="254" required>
  <button class="button button--primary auth-submit" type="submit">Enviar instrucciones</button>
</form>
<p class="auth-card__switch"><a href="{{ url_for('auth.login_form') }}">Volver a iniciar sesión</a></p>
{% endblock %}
