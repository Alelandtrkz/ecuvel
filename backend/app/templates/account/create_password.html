{% extends "auth/auth_base.html" %}

{% block title %}Crear contraseña | Ecuvel{% endblock %}
{% block auth_content %}
<h1 id="auth-title">Crear contraseña</h1>
<p class="auth-card__intro">Agrega una contraseña para poder iniciar sesión también con correo electrónico.</p>
<form method="post" action="{{ url_for('account.create_password_post') }}" class="auth-form" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <label for="new-password">Contraseña</label>
  <input id="new-password" name="new_password" type="password" autocomplete="new-password" maxlength="128" required>

  <label for="new-password-confirmation">Vuelva a escribir la contraseña</label>
  <input id="new-password-confirmation" name="new_password_confirmation" type="password" autocomplete="new-password" maxlength="128" required>

  <button class="button button--primary auth-submit" type="submit">Crear contraseña</button>
</form>
<p class="auth-card__switch"><a href="{{ url_for('account.profile') }}">Volver al perfil</a></p>
{% endblock %}
