{% extends "auth/auth_base.html" %}

{% block title %}Cambiar contraseña | Ecuvel{% endblock %}
{% block auth_content %}
<h1 id="auth-title">Cambiar contraseña</h1>
<p class="auth-card__intro">Confirma tu contraseña actual y elige una nueva.</p>
<form method="post" action="{{ url_for('account.change_password_post') }}" class="auth-form" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="current-password">Contraseña actual</label>
  <input id="current-password" name="current_password" type="password" autocomplete="current-password" maxlength="128" required>
  <label for="new-password">Nueva contraseña</label>
  <input id="new-password" name="new_password" type="password" autocomplete="new-password" maxlength="128" required>
  <label for="new-password-confirmation">Confirmar nueva contraseña</label>
  <input id="new-password-confirmation" name="new_password_confirmation" type="password" autocomplete="new-password" maxlength="128" required>
  <button class="button button--primary auth-submit" type="submit">Actualizar contraseña</button>
</form>
<p class="auth-card__switch"><a href="{{ url_for('account.profile') }}">Volver al perfil</a></p>
{% endblock %}
